<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:#fff;
}

header{
text-align:center;
padding:35px;
background:linear-gradient(135deg,#111827,#0f172a);
}

h1{margin:0;font-size:32px;}
h2{color:#38bdf8;margin-top:30px;}

.paypal-logo{
width:120px;
margin-top:10px;
animation:float 3s ease-in-out infinite;
filter: drop-shadow(0 0 10px #38bdf8);
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}
}

.section{padding:20px;}

.card{
background:#1e293b;
padding:16px;
margin:10px 0;
border-radius:12px;
transition:.3s;
}

.card:hover{
transform:scale(1.02);
background:#0f172a;
}

.flow{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
margin-top:20px;
}

.step{
background:#1e293b;
padding:15px;
border-radius:12px;
width:100%;
max-width:520px;
text-align:center;
animation:fadeIn 1s ease-in;
}

.step:hover{background:#0ea5e9;}

.arrow{
font-size:22px;
animation:bounce 1.5s infinite;
color:#38bdf8;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(6px)}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.whatsapp{
position:fixed;
bottom:18px;
right:18px;
background:#25D366;
padding:14px 16px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
background:#111827;
margin-top:30px;
}
</style>

</head>
